<!DOCTYPE html>
<html>
<head>
<title>Inventory</title>
</head>

<body>

<h2>Add Product</h2>

<form method="POST" action="/add">
Name <input name="name"><br>
Qty <input name="qty"><br>
Price <input name="price"><br>
Supplier <input name="supplier"><br>
<button type="submit">Add</button>
</form>

<h2>Stock List</h2>

<table border="1">
<tr>
<th>ID</th>
<th>Name</th>
<th>Qty</th>
<th>Price</th>
<th>Supplier</th>
</tr>

{% for p in products %}
<tr>
<td>{{p[0]}}</td>
<td>{{p[1]}}</td>
<td>{{p[2]}}</td>
<td>{{p[3]}}</td>
<td>{{p[4]}}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
